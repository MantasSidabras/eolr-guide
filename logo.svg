<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="EOLR cube logo">
  <!-- Isometric cube in the VisualCube color scheme (yellow top U, orange
       front F, blue right R) with a drawn archery bow aimed at it — a nod to
       the "arrow" the EOLR bad edges form. The bow limbs bow toward the cube
       and the string is pulled back into a V at the arrow's nock. -->
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff35a"/>
      <stop offset="1" stop-color="#f4d200"/>
    </linearGradient>
    <linearGradient id="front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9e3d"/>
      <stop offset="1" stop-color="#e8730f"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6bff"/>
      <stop offset="1" stop-color="#1745d6"/>
    </linearGradient>
  </defs>

  <!-- cube body, lower-right so the bow has room upper-left -->
  <g stroke="#12161c" stroke-width="1.8" stroke-linejoin="round">
    <path d="M36 30 L57 42 L36 54 L15 42 Z" fill="url(#top)"/>
    <path d="M15 42 L36 54 L36 63 L15 52 Z" fill="url(#front)"/>
    <path d="M57 42 L36 54 L36 63 L57 52 Z" fill="url(#right)"/>
    <path d="M22 38 L43 50 M29 34 L50 46" fill="none" stroke-opacity="0.35"/>
    <path d="M29 50 L50 38 M22 46 L43 34" fill="none" stroke-opacity="0.35"/>
  </g>

  <!-- drawn bow: limbs bow toward the target (right); string pulled back to a
       V at the nock on the left -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- bowstring: tip -> nock -> tip (the drawn V); light so it reads on both
         the dark header and the light theme -->
    <path d="M20 4 L8 24 L20 44" stroke="#cbd3dc" stroke-width="1.4"/>
    <!-- bow limbs, curving right toward the cube -->
    <path d="M20 4 Q34 24 20 44" stroke="#b06a1f" stroke-width="4"/>
  </g>

  <!-- arrow nocked at the string's V, pointing right into the cube's top -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <line x1="8" y1="24" x2="42" y2="24" stroke="#6b7684" stroke-width="2.4"/>
    <!-- fletching at the nock -->
    <path d="M10 24 L6 20 M10 24 L6 28" stroke="#ff5d8f" stroke-width="1.8"/>
    <!-- arrowhead aimed at the cube -->
    <path d="M48 24 L39 19 L42 24 L39 29 Z" fill="#ff5d8f" stroke="#12161c" stroke-width="1.1"/>
  </g>
</svg>
